<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Purple Calculator</title>

<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family:Arial, Helvetica, sans-serif;

}

body{

    background:#ececf4;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

}

.calculator{

    width:360px;

    background:#ffffff;

    border-radius:20px;

    padding:20px;

    box-shadow:0 15px 35px rgba(0,0,0,.15);

}

.display{

    width:100%;

    height:80px;

    border:none;

    outline:none;

    background:#f5f5fa;

    border-radius:15px;

    padding:15px;

    font-size:32px;

    text-align:right;

    margin-bottom:20px;

    color:#333;

    font-weight:bold;

}

.buttons{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:15px;

}

button{

    height:70px;

    border:none;

    border-radius:16px;

    font-size:24px;

    font-weight:bold;

    cursor:pointer;

    transition:.2s;

}

button:hover{

    transform:scale(1.05);

}

button:active{

    transform:scale(.95);

}

.number{

    background:#ede7ff;

    color:#5b21b6;

}

.operator{

    background:#7c3aed;

    color:white;

}

.equal{

    background:#9333ea;

    color:white;

    grid-column:span 2;

}

.clear{

    background:#ef4444;

    color:white;

}

.zero{

    grid-column:span 2;

}

</style>

</head>

<body>

<div class="calculator">

<input type="text" id="display" class="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>

<button class="operator" onclick="append('/')">÷</button>

<button class="operator" onclick="append('*')">×</button>

<button class="operator" onclick="append('-')">−</button>

<button class="number" onclick="append('7')">7</button>

<button class="number" onclick="append('8')">8</button>

<button class="number" onclick="append('9')">9</button>

<button class="operator" onclick="append('+')">+</button>

<button class="number" onclick="append('4')">4</button>

<button class="number" onclick="append('5')">5</button>

<button class="number" onclick="append('6')">6</button>

<button class="operator" onclick="backspace()">⌫</button>

<button class="number" onclick="append('1')">1</button>

<button class="number" onclick="append('2')">2</button>

<button class="number" onclick="append('3')">3</button>

<button class="operator" onclick="append('.')">.</button>

<button class="number zero" onclick="append('0')">0</button>

<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script>

const display=document.getElementById("display");

function append(value){

    display.value+=value;

}

function clearDisplay(){

    display.value="";

}

function backspace(){

    display.value=display.value.slice(0,-1);

}

function calculate(){

    try{

        display.value=eval(display.value);

    }

    catch{

        display.value="Error";

    }

}

document.addEventListener("keydown",function(e){

    if("0123456789+-*/.".includes(e.key)){

        append(e.key);

    }

    if(e.key==="Enter"){

        calculate();

    }

    if(e.key==="Backspace"){

        backspace();

    }

    if(e.key==="Escape"){

        clearDisplay();

    }

});

</script>

</body>

</html>
